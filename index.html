<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Black Pearl Technology | IT Solutions</title>

<meta name="description"
content="Black Pearl Technology provides cybersecurity, networking, CCTV and IT support services.">

<link rel="icon" type="image/png" href="favicon.png">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box}

/* THEME */

:root{
--bg: radial-gradient(circle at top,#f0f4ff,#ffffff);
--text:#111;
--card: rgba(255,255,255,.85);
}

body.dark{
--bg: radial-gradient(circle at top,#0a0a0a,#000);
--text:#fff;
--card: rgba(255,255,255,.05);
}

body{
font-family:Segoe UI,Tahoma,sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
transition:.5s;
}

.neon{
color:#ff4fd8;
text-shadow:0 0 10px #ff4fd8;
}

.glow{
border:2px solid #38bdf8;
box-shadow:0 0 20px #38bdf8;
}

/* Theme Button */

.theme-btn{
position:fixed;
right:20px;
top:20px;
background:#111;
color:#fff;
border:none;
padding:10px 18px;
border-radius:25px;
cursor:pointer;
z-index:999;
}

/* Header */

header{
position:sticky;
top:0;
background:rgba(0,0,0,.6);
}

.nav{
max-width:1200px;
margin:auto;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:16px;
}

.logo img{
width:85px;
height:85px;
border-radius:50%;
box-shadow:0 0 25px #ff4fd8;
}

/* Hero */

.hero{
min-height:90vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.buttons{
margin-top:30px;
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
padding:14px 30px;
border-radius:30px;
cursor:pointer;
}

/* Assistant */

#assistantBtn{

position:fixed;
bottom:20px;
right:20px;

background:#ff4fd8;
color:#fff;

padding:14px 20px;

border-radius:30px;

cursor:pointer;

box-shadow:0 0 20px #ff4fd8;

z-index:999;

font-weight:bold;

}

#assistantBox{

display:none;

position:fixed;

bottom:80px;
right:20px;

width:270px;

background:#000;

padding:15px;

border-radius:15px;

box-shadow:0 0 25px #38bdf8;

z-index:999;

}

#assistantBox h3{
color:#fff;
margin-bottom:10px;
}

#assistantBox input,
#assistantBox select,
#assistantBox textarea{

width:100%;
margin-bottom:10px;

padding:8px;

border-radius:8px;

border:none;

}

#assistantBox button{

width:100%;

padding:10px;

background:#38bdf8;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

}

</style>
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙 Dark</button>

<header>

<div class="nav">

<div class="logo">

<img src="Neon Black Pearl technology logo.png">

<div class="neon">
BLACK PEARL TECHNOLOGY
</div>

</div>

</div>

</header>

<section class="hero">

<div>

<h1 class="neon">
IT Solutions for Every Digital Challenge
</h1>

<p>
Complete IT solutions including hardware, software, cybersecurity and server management.
</p>

<div class="buttons">

<a href="tel:+919003601627" class="btn glow">
Call Now
</a>

<a href="https://wa.me/919003601627" class="btn glow" target="_blank">
WhatsApp
</a>

<a href="mailto:blackpearltechnologycbe@gmail.com" class="btn glow">
Email
</a>

</div>

</div>

</section>

<!-- Assistant Button -->

<div id="assistantBtn"
onclick="openAssistant()">

👩‍💼 Assistant

</div>

<!-- Assistant Form -->

<div id="assistantBox">

<h3>Quick Support</h3>

<input type="text"
id="custName"
placeholder="Your Name">

<input type="tel"
id="custPhone"
placeholder="Phone Number">

<select id="custService">

<option>Select Service</option>

<option>Cybersecurity</option>

<option>Networking</option>

<option>Server Support</option>

<option>AMC Support</option>

<option>Hardware Service</option>

</select>

<textarea
id="custMessage"
placeholder="Describe your issue"></textarea>

<button onclick="sendDetails()">
Send Inquiry
</button>

</div>

<script>

/* Theme */

function toggleTheme(){

document.body.classList.toggle("dark");

}

/* Open Assistant */

function openAssistant(){

let box =
document.getElementById("assistantBox");

if(box.style.display==="none"
|| box.style.display===""){

box.style.display="block";

}else{

box.style.display="none";

}

}

/* Send Details */

function sendDetails(){

let name =
document.getElementById("custName").value;

let phone =
document.getElementById("custPhone").value;

let service =
document.getElementById("custService").value;

let message =
document.getElementById("custMessage").value;

let text =
"New Customer Inquiry%0A"+
"Name: "+name+"%0A"+
"Phone: "+phone+"%0A"+
"Service: "+service+"%0A"+
"Message: "+message;

/* WhatsApp */

let whatsapp =
"https://wa.me/919003601627?text="+text;

/* Email */

let email =
"mailto:blackpearltechnologycbe@gmail.com"+
"?subject=New Customer Inquiry"+
"&body="+text;

/* Open WhatsApp */

window.open(whatsapp,'_blank');

/* Open Email */

window.location.href=email;

}

</script>

</body>

</html>
